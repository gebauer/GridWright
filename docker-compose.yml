services:
  app:
    build: .
 #   ports:               # expose ports if you run it directly, but no need if deployed by coolify
 #     - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      - DB_PATH=/data/gridwright.db
      # - SCREEN_TTL_DAYS=90
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
